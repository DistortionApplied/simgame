<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            color: #202124;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            text-align: center;
            padding: 150px 0 30px;
        }

        .logo h1 {
            color: #4285f4;
            font-size: 86px;
            font-weight: normal;
            margin: 0;
            line-height: 1;
        }

        .search-container {
            position: relative;
            margin: 0 auto 30px;
        }

        .search-box {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 1px solid #dadce0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .search-box:focus {
            border-color: #1a73e8;
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }

        .search-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .btn:hover {
            box-shadow: 0 1px 3px rgba(60,64,67,.302);
        }

        .language-selector {
            text-align: center;
            font-size: 13px;
            color: #70757a;
            margin-bottom: 20px;
        }

        .language-selector a {
            color: #1a0dab;
            text-decoration: none;
            margin: 0 5px;
        }

        .language-selector a:hover {
            text-decoration: underline;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f2f2f2;
            border-top: 1px solid #e4e4e4;
            padding: 15px 30px;
            font-size: 14px;
            color: #70757a;
        }

        .footer-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-links {
            display: flex;
            gap: 15px;
        }

        .footer-links a {
            color: #70757a;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .logo h1 {
                font-size: 64px;
            }

            .footer-content {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .footer-links {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Google</h1>
        </div>

        <div class="search-container">
            <input type="text" class="search-box" placeholder="Search Google or type a URL" autocomplete="off">
        </div>

        <div class="search-buttons">
            <button class="btn">Google Search</button>
            <button class="btn">I'm Feeling Lucky</button>
        </div>

        <div class="language-selector">
            Google offered in:
            <a href="#">Français</a>
            <a href="#">Español</a>
            <a href="#">Deutsch</a>
            <a href="#">Italiano</a>
            <a href="#">Português</a>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </div>
</body>
</html>
